    { w: "elevate", pos: "v.", def: "To lift up; to raise to a higher state; to exalt in rank or estimation.", synonyms: ["aggrandise","boost","dignify","distinguish","elevate","exalt","glorify","heighten","honour","improve","lift","promote","raise","upgrade"], behaviours: ["Making them feel bigger in the room","Treating their work or words as significant","Not pulling them down to your level — rising to theirs","Making the elevation feel permanent rather than performed"] },
    { w: "dignify", pos: "v.", def: "To give dignity or honour to; to confer honour or distinction upon; to make worthy.", synonyms: ["adorn","crown","distinguish","elevate","ennoble","exalt","glorify","grace","honour","raise","upgrade"], behaviours: ["Treating what they've brought as worthy of serious attention","Not making anything small that they've offered large","Making them feel entitled to the space they're standing in","Refusing to let them shrink themselves while you're with them"] },
    { w: "ennoble", pos: "v.", def: "To make noble; to elevate in degree, excellence, or respect; to give greater worth or dignity to.", synonyms: ["aggrandise","dignify","distinguish","elevate","exalt","glorify","grace","honour","raise","refine","upgrade"], behaviours: ["Making them feel that they are more than the ordinary version of themselves","Bringing out what is fine and worth keeping","Treating the encounter as one that should leave them better","Not making the elevation contingent on performance"] }
  ]}
];

const list = document.getElementById("category-list");

CATEGORIES.forEach(cat => {
  const item = document.createElement("div");
  item.className = "category-item";

  const toggle = document.createElement("button");
  toggle.className = "category-toggle";
  toggle.innerHTML = `<span><span class="category-name">${cat.name}</span><span class="category-count">${cat.words.length} words</span></span><span class="category-chevron">&#9660;</span>`;
  toggle.addEventListener("click", () => item.classList.toggle("open"));

  const body = document.createElement("div");
  body.className = "category-body";

  const chipsDiv = document.createElement("div");
  chipsDiv.className = "word-chips";

  const detailDiv = document.createElement("div");
  detailDiv.className = "word-detail";
  detailDiv.style.display = "none";
  let currentWord = "";

  cat.words.forEach(entry => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = entry.w;
    chip.addEventListener("click", () => {
      if (currentWord === entry.w && detailDiv.style.display !== "none") {
        detailDiv.style.display = "none";
        currentWord = "";
        chip.classList.remove("chip-active");
        return;
      }
      chipsDiv.querySelectorAll(".chip").forEach(c => c.classList.remove("chip-active"));
      chip.classList.add("chip-active");
      currentWord = entry.w;
      detailDiv.style.display = "block";
      const behHTML = entry.behaviours.map(b => `<li>${b}</li>`).join("");
      const synHTML = entry.synonyms && entry.synonyms.length
        ? `<div class="word-synonyms"><span class="syn-label">Also known as</span><span class="syn-list">${entry.synonyms.join(" · ")}</span></div>`
        : "";
      detailDiv.innerHTML = `
        <div class="word-detail-title">${entry.w} <span style="font-family:var(--font-mono);font-size:13px;font-weight:300;color:var(--text-dim);font-style:italic;">${entry.pos}</span></div>
        <p class="word-detail-def">${entry.def}</p>
        ${synHTML}
        <div class="word-detail-behaviours">
          <span class="word-detail-beh-label">How it might look</span>
          <ul class="behaviour-list">${behHTML}</ul>
        </div>`;
    });
    chipsDiv.appendChild(chip);
  });

  body.appendChild(chipsDiv);
  body.appendChild(detailDiv);
  item.appendChild(toggle);
  item.appendChild(body);
  list.appendChild(item);
});
</script>
</body>
</html>
