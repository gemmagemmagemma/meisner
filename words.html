const list = document.getElementById("category-list");

CATEGORIES.forEach(cat => {
  const item = document.createElement("div");
  item.className = "category-item";

  const toggle = document.createElement("button");
  toggle.className = "category-toggle";
  toggle.innerHTML = `<span><span class="category-name">${cat.name}</span><span class="category-count">${cat.words.length} words</span></span><span class="category-chevron">&#9660;</span>`;
  toggle.addEventListener("click", () => item.classList.toggle("open"));

  const body = document.createElement("div");
  body.className = "category-body";

  const chipsDiv = document.createElement("div");
  chipsDiv.className = "word-chips";

  const detailDiv = document.createElement("div");
  detailDiv.className = "word-detail";
  detailDiv.style.display = "none";
  let currentWord = "";

  cat.words.forEach(entry => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = entry.w;
    chip.addEventListener("click", () => {
      if (currentWord === entry.w && detailDiv.style.display !== "none") {
        detailDiv.style.display = "none";
        currentWord = "";
        chip.classList.remove("chip-active");
        return;
      }
      chipsDiv.querySelectorAll(".chip").forEach(c => c.classList.remove("chip-active"));
      chip.classList.add("chip-active");
      currentWord = entry.w;
      detailDiv.style.display = "block";
      detailDiv.innerHTML = `<div class="word-detail-title">${entry.w} <span style="font-family:var(--font-mono);font-size:13px;font-weight:300;color:var(--text-dim);font-style:italic;">${entry.pos}</span></div><p class="word-detail-def">${entry.def}</p>`;
    });
    chipsDiv.appendChild(chip);
  });

  body.appendChild(chipsDiv);
  body.appendChild(detailDiv);
  item.appendChild(toggle);
  item.appendChild(body);
  list.appendChild(item);
});
