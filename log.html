<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpg" href="IMG_2884.JPG">
  <title>My Work — Meisner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .person-switcher {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .person-tab {
      font-family: var(--font-mono); font-size: 15px; font-weight: 400;
      padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .person-tab:hover { background: var(--bg-card); color: var(--text); }
    .person-tab.active { background: var(--green-glow); border-color: var(--green-dim); color: var(--green); font-weight: 500; }
    .btn-add-person {
      font-family: var(--font-mono); font-size: 14px; color: var(--text-dim);
      background: transparent; border: 1px dashed var(--border-hover);
      padding: 8px 16px; border-radius: 100px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .btn-add-person:hover { color: var(--green); border-color: var(--green-dim); }
    .entry-index { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 28px; overflow: hidden; }
    .entry-index-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: none; border: none; cursor: pointer; font-family: var(--font-mono); transition: background 0.15s;
    }
    .entry-index-toggle:hover { background: var(--bg-card-hover); }
    .entry-index-label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
    .entry-index-chevron { font-size: 13px; color: var(--text-dim); transition: transform 0.2s; }
    .entry-index.open .entry-index-chevron { transform: rotate(180deg); }
    .entry-index-body { display: none; border-top: 1px solid var(--border); }
    .entry-index.open .entry-index-body { display: block; }
    .entry-index-item {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.12s; gap: 12px;
    }
    .entry-index-item:last-child { border-bottom: none; }
    .entry-index-item:hover { background: var(--bg-card-hover); }
    .entry-index-name { font-size: 14px; color: var(--text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-index-date { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .back-to-top {
      display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono);
      font-size: 13px; color: var(--text-dim); background: transparent; border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 100px; cursor: pointer; margin-top: 12px; margin-bottom: 32px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-to-top:hover { color: var(--green); border-color: var(--green-dim); }
    .person-view-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
    .person-view-name { font-family: var(--font-display); font-size: 32px; font-weight: 400; color: var(--text); }
    .person-entry-count { font-size: 13px; color: var(--text-dim); }
    .loading-state { font-size: 15px; color: var(--text-dim); font-style: italic; padding: 40px 0; text-align: center; }
    .doings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 26px; margin-bottom: 16px; }
    .doings-section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 18px; display: block; }
    .section-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 6px 0; background: none; border: none; cursor: pointer; font-family: var(--font-mono); }
    .section-toggle-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-weight: 400; }
    .section-toggle-chevron { font-size: 12px; color: var(--text-dim); transition: transform 0.2s; }
    .section-open .section-toggle-chevron { transform: rotate(180deg); }
    .section-body { display: none; margin-top: 16px; }
    .section-open .section-body { display: block; }
    .doings-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .doings-form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .doings-form-row input[type="text"] { flex: 1; min-width: 140px; }
    .doings-form-row input[type="date"] { max-width: 180px; }
    .doing-card { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; position: relative; }
    .doing-card:last-child { margin-bottom: 0; }
    .doing-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .doing-word { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--text); font-style: italic; }
    .doing-date { font-size: 12px; color: var(--text-dim); }
    .doing-note { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-top: 4px; white-space: pre-wrap; }
    .doing-delete { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; line-height: 1; padding: 0; }
    .doing-delete:hover { color: var(--text-muted); }
    .doings-empty { font-size: 14px; color: var(--text-dim); font-style: italic; }
  </style>
</head>
<body>
<nav>
  <span class="nav-title">Meisner</span>
  <div class="nav-links">
    <a href="index.html">Generator</a>
    <a href="log.html" class="active">My Work</a>
    <a href="words.html">Behaviour</a>
    <a href="doings.html">Doings</a>
    <a href="prompt.html">Prompter</a>
  </div>
</nav>

<main id="top">
  <header class="page-header">
    <h1>My<br><em>Work</em></h1>
    <p class="subtitle">Log exercises and track rep club attendance.</p>
  </header>

  <div class="person-switcher" id="person-switcher">
    <div id="person-tabs" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    <button class="btn-add-person" onclick="openAddPerson()">+ Add person</button>
  </div>

  <div class="log-form" id="log-form" style="display:none;">
    <div class="form-row"><label for="log-title">Title</label><input type="text" id="log-title" placeholder="e.g. Broken Mug Exercise"></div>
    <div class="form-row"><label for="log-date">Date</label><input type="date" id="log-date"></div>
    <div class="form-row"><label for="log-notes">Notes</label><textarea id="log-notes" placeholder="Describe your circumstance, the world/setting, want, activity, door, etc."></textarea></div>
    <button class="btn-generate" onclick="saveEntry()">Save Entry</button>
  </div>

  <div id="person-view"><p class="loading-state">Loading...</p></div>

  <!-- Edit modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><span class="modal-heading">Edit entry</span><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="form-row"><label>Title</label><input type="text" id="edit-title"></div>
      <div class="form-row"><label>Date</label><input type="date" id="edit-date"></div>
      <div class="form-row"><label>Notes</label><textarea id="edit-notes" style="min-height:110px;"></textarea></div>
      <div class="form-row"><label>Class notes</label><textarea id="edit-comment" style="min-height:80px;" placeholder="Feedback, observations, what shifted..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-generate" onclick="saveEdit()">Save changes</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add person modal -->
  <div id="add-person-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAddPerson()">
    <div class="modal">
      <div class="modal-header"><span class="modal-heading">Add person</span><button class="modal-close" onclick="closeAddPerson()">×</button></div>
      <div class="form-row"><label>Name</label><input type="text" id="new-person-name" placeholder="e.g. Diddy" maxlength="40"></div>
      <div class="modal-actions">
        <button class="btn-generate" onclick="confirmAddPerson()">Add</button>
        <button class="btn-cancel" onclick="closeAddPerson()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</main>

<script src="db.js"></script>
<script>
let activePerson = null;
let editingId = null;
const repViewMonth = {};
const REP_DAYS = ["Tue","Fri","Sun"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

document.getElementById("log-date").value = new Date().toISOString().split("T")[0];
document.getElementById("new-person-name").addEventListener("keydown", e => { if (e.key === "Enter") confirmAddPerson(); });

async function init() {
  const d = await getLogData();
  if (d.persons.length && !activePerson) activePerson = d.persons[0];
  renderTabs(d);
  renderLogForm();
  renderPersonView();
}

function renderTabs(d) {
  const el = document.getElementById("person-tabs");
  el.innerHTML = "";
  d.persons.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "person-tab" + (name === activePerson ? " active" : "");
    btn.textContent = name;
    btn.addEventListener("click", async () => {
      activePerson = name;
      const fresh = await getLogData();
      renderTabs(fresh);
      renderLogForm();
      renderPersonView();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    el.appendChild(btn);
  });
}

function renderLogForm() {
  document.getElementById("log-form").style.display = activePerson ? "block" : "none";
}

function openAddPerson() {
  document.getElementById("new-person-name").value = "";
  document.getElementById("add-person-modal").style.display = "flex";
  setTimeout(() => document.getElementById("new-person-name").focus(), 50);
}
function closeAddPerson() { document.getElementById("add-person-modal").style.display = "none"; }

async function confirmAddPerson() {
  const name = document.getElementById("new-person-name").value.trim();
  if (!name) return;
  const d = await getLogData();
  if (d.persons.includes(name)) { showToast("Name already exists"); return; }
  d.persons.push(name);
  if (!d.entries[name]) d.entries[name] = [];
  if (!d.rep[name]) d.rep[name] = {};
  if (!d.doings) d.doings = {};
  if (!d.doings[name]) d.doings[name] = [];
  await saveLogData(d);
  activePerson = name;
  closeAddPerson();
  renderTabs(d);
  renderLogForm();
  renderPersonView();
}

async function saveEntry() {
  if (!activePerson) return;
  const title = document.getElementById("log-title").value.trim();
  const notes = document.getElementById("log-notes").value.trim();
  if (!title && !notes) return;
  showToast("Saving...");
  const d = await getLogData();
  if (!d.entries[activePerson]) d.entries[activePerson] = [];
  d.entries[activePerson].unshift({
    id: Date.now(), title: title || "Untitled",
    date: document.getElementById("log-date").value, notes, comment: "", updatedAt: null
  });
  await saveLogData(d);
  document.getElementById("log-title").value = "";
  document.getElementById("log-notes").value = "";
  renderPersonView();
  showToast("Entry saved");
}

async function deleteEntry(person, id) {
  if (!confirm("Delete this entry?")) return;
  const d = await getLogData();
  d.entries[person] = (d.entries[person] || []).filter(e => e.id !== id);
  await saveLogData(d);
  renderPersonView();
}

async function openEdit(person, id) {
  const d = await getLogData();
  const entry = (d.entries[person] || []).find(e => e.id === id);
  if (!entry) return;
  editingId = { person, id };
  document.getElementById("edit-title").value = entry.title || "";
  document.getElementById("edit-date").value = entry.date || "";
  document.getElementById("edit-notes").value = entry.notes || "";
  document.getElementById("edit-comment").value = entry.comment || "";
  document.getElementById("modal-overlay").style.display = "flex";
}
function closeModal() { document.getElementById("modal-overlay").style.display = "none"; editingId = null; }

async function saveEdit() {
  if (!editingId) return;
  const { person, id } = editingId;
  showToast("Saving...");
  const d = await getLogData();
  d.entries[person] = (d.entries[person] || []).map(e => e.id !== id ? e : {
    ...e,
    title: document.getElementById("edit-title").value.trim() || "Untitled",
    date: document.getElementById("edit-date").value,
    notes: document.getElementById("edit-notes").value.trim(),
    comment: document.getElementById("edit-comment").value.trim(),
    updatedAt: Date.now()
  });
  await saveLogData(d);
  closeModal();
  renderPersonView();
  showToast("Updated");
}

function formatDate(str) {
  if (!str) return "";
  return new Date(str + "T00:00:00").toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" });
}

// ── DOINGS ───────────────────────────────────────────────────────
async function buildDoingsSection(person, container) {
  const d = await getLogData();
  if (!d.doings) d.doings = {};
  const doings = d.doings[person] || [];
  container.innerHTML = "";

  const form = document.createElement("div"); form.className = "doings-form";
  const row = document.createElement("div"); row.className = "doings-form-row";
  const wordInput = document.createElement("input"); wordInput.type = "text"; wordInput.placeholder = "e.g. charm, confront, pressure…";
  const dateInput = document.createElement("input"); dateInput.type = "date"; dateInput.value = new Date().toISOString().split("T")[0];
  row.appendChild(wordInput); row.appendChild(dateInput);
  const noteInput = document.createElement("textarea"); noteInput.placeholder = "How did it go?"; noteInput.rows = 2; noteInput.style.resize = "vertical";
  const saveBtn = document.createElement("button"); saveBtn.className = "btn-generate"; saveBtn.style.alignSelf = "flex-start"; saveBtn.textContent = "Save doing";
  saveBtn.addEventListener("click", async () => {
    const word = wordInput.value.trim();
    if (!word) return;
    showToast("Saving...");
    const fresh = await getLogData();
    if (!fresh.doings) fresh.doings = {};
    if (!fresh.doings[person]) fresh.doings[person] = [];
    fresh.doings[person].unshift({ id: Date.now(), doing: word, date: dateInput.value, note: noteInput.value.trim() });
    await saveLogData(fresh);
    wordInput.value = ""; noteInput.value = "";
    buildDoingsSection(person, container);
    showToast("Saved");
  });
  form.appendChild(row); form.appendChild(noteInput); form.appendChild(saveBtn);
  container.appendChild(form);

  if (!doings.length) {
    const empty = document.createElement("p"); empty.className = "doings-empty"; empty.textContent = "No doings logged yet.";
    container.appendChild(empty);
  } else {
    doings.forEach(item => {
      const card = document.createElement("div"); card.className = "doing-card";
      const meta = document.createElement("div"); meta.className = "doing-meta";
      const word = document.createElement("span"); word.className = "doing-word"; word.textContent = item.doing;
      const date = document.createElement("span"); date.className = "doing-date"; date.textContent = formatDate(item.date);
      meta.appendChild(word); meta.appendChild(date);
      const delBtn = document.createElement("button"); delBtn.className = "doing-delete"; delBtn.textContent = "×";
      delBtn.addEventListener("click", async () => {
        const fresh = await getLogData();
        fresh.doings[person] = fresh.doings[person].filter(x => x.id !== item.id);
        await saveLogData(fresh);
        buildDoingsSection(person, container);
      });
      card.appendChild(meta);
      if (item.note) { const note = document.createElement("p"); note.className = "doing-note"; note.textContent = item.note; card.appendChild(note); }
      card.appendChild(delBtn);
      container.appendChild(card);
    });
  }
}

// ── REP CLUB ──────────────────────────────────────────────────────
function getWeeksInMonth(year, month) {
  const last = new Date(year, month + 1, 0);
  const weeks = [];
  let start = new Date(year, month, 1);
  const dow = start.getDay();
  start.setDate(start.getDate() + (dow === 0 ? -6 : 1 - dow));
  while (start <= last) { weeks.push(new Date(start)); start.setDate(start.getDate() + 7); }
  return weeks;
}

function getRepDayDate(weekStart, day) {
  const d = new Date(weekStart);
  d.setDate(d.getDate() + { Tue:1, Fri:4, Sun:6 }[day]);
  return d;
}

async function buildRepCalendar(person, container) {
  container.innerHTML = '<p style="font-size:13px;color:var(--text-dim);font-style:italic;padding:8px 0;">Loading calendar...</p>';
  const d = await getLogData();
  const repData = d.rep[person] || {};
  const now = new Date();
  if (!repViewMonth[person]) repViewMonth[person] = { year: now.getFullYear(), month: now.getMonth() };
  const { year, month } = repViewMonth[person];
  const weeks = getWeeksInMonth(year, month);
  container.innerHTML = "";

  const header = document.createElement("div"); header.className = "rep-month-header";
  const lbl = document.createElement("span"); lbl.className = "rep-month-label"; lbl.textContent = `${MONTHS[month]} ${year}`;
  const nav = document.createElement("div"); nav.className = "rep-month-nav";
  const prev = document.createElement("button"); prev.className = "rep-nav-btn"; prev.textContent = "←";
  prev.addEventListener("click", () => {
    let { year: y, month: m } = repViewMonth[person];
    m--; if (m < 0) { m = 11; y--; }
    repViewMonth[person] = { year: y, month: m };
    buildRepCalendar(person, container);
  });
  const next = document.createElement("button"); next.className = "rep-nav-btn"; next.textContent = "→";
  next.addEventListener("click", () => {
    let { year: y, month: m } = repViewMonth[person];
    m++; if (m > 11) { m = 0; y++; }
    repViewMonth[person] = { year: y, month: m };
    buildRepCalendar(person, container);
  });
  nav.appendChild(prev); nav.appendChild(next);
  header.appendChild(lbl); header.appendChild(nav);
  container.appendChild(header);

  const cal = document.createElement("div"); cal.className = "rep-calendar";

  for (const [wi, weekStart] of weeks.entries()) {
    const weekRow = document.createElement("div"); weekRow.className = "rep-week";
    const wlbl = document.createElement("span"); wlbl.className = "rep-week-label"; wlbl.textContent = `Wk ${wi + 1}`;
    weekRow.appendChild(wlbl);
    const slots = document.createElement("div"); slots.className = "rep-day-slots";

    for (const day of REP_DAYS) {
      const date = getRepDayDate(weekStart, day);
      const inMonth = date.getMonth() === month && date.getFullYear() === year;
      const dayCol = document.createElement("div"); dayCol.className = "rep-day";
      const dayName = document.createElement("span"); dayName.className = "rep-day-name";
      const tick = document.createElement("div"); tick.className = "rep-tick";

      if (!inMonth) {
        dayName.textContent = day;
        tick.style.opacity = "0.15"; tick.style.cursor = "default"; tick.style.pointerEvents = "none";
      } else {
        const k = `${year}-${month}-w${wi}-${day}`;
        const attended = repData[k] || false;
        dayName.textContent = `${day} ${date.getDate()}`;
        if (attended) { tick.classList.add("attended"); tick.textContent = "✓"; }
        tick.addEventListener("click", async () => {
          const fresh = await getLogData();
          if (!fresh.rep[person]) fresh.rep[person] = {};
          fresh.rep[person][k] = !fresh.rep[person][k];
          await saveLogData(fresh);
          buildRepCalendar(person, container);
        });
      }
      dayCol.appendChild(dayName); dayCol.appendChild(tick); slots.appendChild(dayCol);
    }

    weekRow.appendChild(slots); cal.appendChild(weekRow);
  }
  container.appendChild(cal);
}

// ── PERSON VIEW ───────────────────────────────────────────────────
async function renderPersonView() {
  const container = document.getElementById("person-view");
  container.innerHTML = '<p class="loading-state">Loading...</p>';
  const d = await getLogData();

  if (!activePerson) {
    container.innerHTML = '<p class="empty-state">Add a person above to start logging.</p>';
    return;
  }

  container.innerHTML = "";
  const entries = d.entries[activePerson] || [];

  const viewHeader = document.createElement("div"); viewHeader.className = "person-view-header";
  const nameLbl = document.createElement("span"); nameLbl.className = "person-view-name"; nameLbl.textContent = activePerson;
  const countLbl = document.createElement("span"); countLbl.className = "person-entry-count";
  countLbl.textContent = entries.length === 1 ? "1 entry" : `${entries.length} entries`;
  viewHeader.appendChild(nameLbl); viewHeader.appendChild(countLbl);
  container.appendChild(viewHeader);

  const repSec = document.createElement("div"); repSec.className = "rep-section";
  const repToggle = document.createElement("button"); repToggle.className = "section-toggle";
  repToggle.innerHTML = '<span class="section-toggle-label">Rep Club Attendance</span><span class="section-toggle-chevron">▾</span>';
  repToggle.addEventListener("click", () => { repSec.classList.toggle("section-open"); if (repSec.classList.contains("section-open")) buildRepCalendar(activePerson, repCal); });
  const repCal = document.createElement("div"); repCal.className = "section-body";
  repSec.appendChild(repToggle); repSec.appendChild(repCal);
  container.appendChild(repSec);

  const doingsSec = document.createElement("div"); doingsSec.className = "doings-section";
  const doingsToggle = document.createElement("button"); doingsToggle.className = "section-toggle";
  doingsToggle.innerHTML = '<span class="section-toggle-label">Doings</span><span class="section-toggle-chevron">▾</span>';
  doingsToggle.addEventListener("click", () => { doingsSec.classList.toggle("section-open"); if (doingsSec.classList.contains("section-open")) buildDoingsSection(activePerson, doingsList); });
  const doingsList = document.createElement("div"); doingsList.className = "section-body";
  doingsSec.appendChild(doingsToggle); doingsSec.appendChild(doingsList);
  container.appendChild(doingsSec);

  if (entries.length > 0) {
    const index = document.createElement("div"); index.className = "entry-index";
    const indexToggle = document.createElement("button"); indexToggle.className = "entry-index-toggle";
    indexToggle.innerHTML = `<span class="entry-index-label">Entry index (${entries.length})</span><span class="entry-index-chevron">▾</span>`;
    indexToggle.addEventListener("click", () => index.classList.toggle("open"));
    const indexBody = document.createElement("div"); indexBody.className = "entry-index-body";
    entries.forEach(entry => {
      const row = document.createElement("div"); row.className = "entry-index-item";
      row.innerHTML = `<span class="entry-index-name">${entry.title || "Untitled"}</span><span class="entry-index-date">${formatDate(entry.date)}</span>`;
      row.addEventListener("click", () => {
        const target = document.getElementById("entry-" + entry.id);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        index.classList.remove("open");
      });
      indexBody.appendChild(row);
    });
    index.appendChild(indexToggle); index.appendChild(indexBody);
    container.appendChild(index);
  }

  if (!entries.length) {
    const empty = document.createElement("p"); empty.className = "empty-state"; empty.style.padding = "20px 0"; empty.textContent = "No entries yet.";
    container.appendChild(empty);
  } else {
    entries.forEach(entry => {
      const card = document.createElement("div"); card.className = "entry-card"; card.id = "entry-" + entry.id;
      const updated = entry.updatedAt ? `<span class="entry-updated-tag">updated ${formatDate(new Date(entry.updatedAt).toISOString().split("T")[0])}</span>` : "";
      const comment = entry.comment ? `<div class="entry-comment"><span class="comment-label">Class notes</span><p class="comment-text">${entry.comment.replace(/\n/g,"<br>")}</p></div>` : "";
      card.innerHTML = `
        <div class="entry-meta">
          <span class="entry-date">${formatDate(entry.date)}</span>${updated}
          <div class="entry-actions">
            <button class="btn-edit">Edit</button>
            <button class="entry-delete">×</button>
          </div>
        </div>
        <h3 class="entry-title">${entry.title || "Untitled"}</h3>
        ${entry.notes ? `<p class="entry-notes">${entry.notes.replace(/\n/g,"<br>")}</p>` : ""}
        ${comment}`;
      card.querySelector(".btn-edit").addEventListener("click", () => openEdit(activePerson, entry.id));
      card.querySelector(".entry-delete").addEventListener("click", () => deleteEntry(activePerson, entry.id));
      const btt = document.createElement("button"); btt.className = "back-to-top"; btt.textContent = "↑ Back to top";
      btt.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
      container.appendChild(card);
      container.appendChild(btt);
    });
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

init();
</script>
</body>
</html>
